<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat RAG System</title>
    <link class="favicon" rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>🔍</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="/static/css/style.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: '#3b82f6' } } } }
    </script>
</head>

<body
    class="antialiased h-screen flex overflow-hidden selection:bg-primary selection:text-white bg-white dark:bg-[#171717]">

    <!-- Sidebar Component (No border-r) -->
    <aside id="sidebar"
        class="w-66 w-[260px] h-full flex flex-col bg-neutral-50 dark:bg-[#121212] z-40 transition-transform duration-300 md:translate-x-0 md:static fixed inset-y-0 left-0 -translate-x-full">
        <!-- Sidebar Header (No brain logo, has arrow-left instead) -->
        <div class="p-4 flex items-center justify-between">
            <a href="/" class="flex items-center gap-2 font-bold text-lg tracking-tight hover:opacity-80 transition">
                <i data-lucide="arrow-left" class="w-5 h-5 text-primary"></i>
                <span>T E X T R A G</span>
            </a>
            <!-- Mobile Close Button -->
            <button id="sidebar-close"
                class="md:hidden p-1.5 hover:bg-black/5 dark:hover:bg-white/5 rounded-lg transition">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
        </div>

        <!-- New Chat Button -->
        <div class="p-3">
            <button id="new-chat-btn"
                class="w-full flex items-center justify-center gap-2 py-2.5 px-4 rounded-xl border border-dashed border-[#d5d5d5] dark:border-[#3a3a3a] hover:bg-black/5 dark:hover:bg-white/5 transition font-medium text-sm">
                <i data-lucide="plus" class="w-4 h-4"></i>
                <span>New chat</span>
            </button>
        </div>

        <!-- Scrollable Sessions List -->
        <div id="sessions-list" class="flex-grow overflow-y-auto px-2 py-2 space-y-1">
            <!-- Sessions will be loaded here dynamically -->
        </div>
    </aside>

    <!-- Mobile Sidebar Overlay -->
    <div id="sidebar-overlay"
        class="md:hidden fixed inset-0 bg-black/40 z-30 hidden transition-opacity duration-300 opacity-0"></div>

    <!-- Main Content Container -->
    <div class="flex-grow h-full flex flex-col overflow-hidden relative bg-white dark:bg-[#171717]">
        <!-- Top Bar -->
        <div class="w-full z-20 flex-shrink-0">
            <div class="px-4 sm:px-6 flex justify-between h-14 items-center">
                <div class="flex items-center gap-2">
                    <!-- Sidebar Toggle Button (collapses/opens sidebar) -->
                    <button id="sidebar-toggle"
                        class="p-2 hover:bg-black/5 dark:hover:bg-white/5 rounded-lg transition">
                        <i data-lucide="menu" class="w-5 h-5"></i>
                    </button>
                    <!-- Hidden element to prevent chat.js selector crashes -->
                    <span id="active-chat-title" class="hidden"></span>
                </div>
                <div class="flex items-center gap-4">
                    <div
                        class="hidden sm:flex items-center text-xs font-semibold px-3 py-1 rounded-full bg-green-100 text-green-700 dark:bg-green-900/30 dark:text-green-400">
                        <span class="w-2 h-2 rounded-full bg-green-500 mr-2 animate-pulse"></span> ChromaDB Connected
                    </div>
                    <!-- Data Button at its previous top-right position -->
                    <a href="/documents"
                        class="text-sm font-medium hover:text-primary flex items-center gap-1 transition">
                        <i data-lucide="folder-open" class="w-4 h-4"></i> Data
                    </a>
                    <button id="theme-toggle" class="p-2 rounded-lg hover:bg-black/5 dark:hover:bg-white/5 transition">
                        <i data-lucide="moon" class="w-5 h-5 dark:hidden"></i>
                        <i data-lucide="sun" class="w-5 h-5 hidden dark:block"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- Chat Workspace containing Scroll Area and Center/Bottom Input Group -->
        <div id="chat-workspace" class="state-initial flex-grow flex flex-col relative overflow-hidden">

            <!-- Chat History Scrollable Area -->
            <div id="chat-history-scroll" class="overflow-y-auto w-full">
                <div id="chat-history" class="max-w-3xl mx-auto px-4 py-8 space-y-6">
                    <!-- Messages will dynamically append here -->
                </div>
            </div>

            <!-- Center Group (fades/slides during transition) -->
            <div id="center-group" class="w-full">

                <!-- Initial Empty State -->
                <div class="flex flex-col items-center justify-center p-8 text-center max-w-lg mx-auto"
                    id="empty-state">
                    <h2 class="text-3xl font-bold mb-2">How can I help you today?</h2>
                </div>

                <!-- Premium ChatGPT Style Input Container -->
                <div id="input-container" class="w-full max-w-3xl px-4 pb-8 relative mx-auto">
                    <div
                        class="relative flex items-center bg-white dark:bg-[#2f2f2f] rounded-3xl border border-[#e5e5e5] dark:border-[#424242] shadow-[0_9px_24px_rgba(0,0,0,0.06)] dark:shadow-[0_9px_24px_rgba(0,0,0,0.2)] focus-within:border-gray-400 dark:focus-within:border-gray-500 transition-all p-1.5 pl-4 pr-2">
                        <textarea id="chat-input" rows="1" placeholder="Ask me anything  !!..."
                            class="flex-grow bg-transparent text-sm sm:text-base text-gray-900 dark:text-gray-100 placeholder-gray-500 focus:outline-none resize-none max-h-52 py-2 pr-12 styling-scrollbar overflow-y-auto block"></textarea>

                        <div class="flex items-center gap-1">
                            <!-- Microphone Speech-to-Text Button -->
                            <button id="mic-btn" type="button"
                                class="p-2.5 rounded-full hover:bg-gray-100 dark:hover:bg-neutral-800 text-gray-500 dark:text-gray-400 transition-all relative flex items-center justify-center"
                                title="Speech to text">
                                <i data-lucide="mic" class="w-5 h-5"></i>
                                <span class="absolute inset-0 rounded-full bg-red-500/20 animate-ping hidden"
                                    id="mic-pulse"></span>
                            </button>

                            <!-- Send Button -->
                            <button id="send-btn"
                                class="p-2.5 rounded-full bg-neutral-900 dark:bg-white text-white dark:text-neutral-900 hover:opacity-90 disabled:opacity-30 disabled:hover:opacity-30 transition-all flex items-center justify-center">
                                <i data-lucide="arrow-up" class="w-5 h-5"></i>
                            </button>
                        </div>
                    </div>
                </div>

            </div>

        </div>

    </div>

    <script type="module" src="/static/js/components/chat.js"></script>
</body>

</html>
